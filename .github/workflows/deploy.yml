name: Build, Push and Update Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Create unique image tag (commit SHA)
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4. Build Docker image
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.TAG }} .

      # 5. Push Docker image
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.TAG }}

      # 6. Update Kubernetes deployment YAML with new tag
      - name: Update deployment file
        run: |
          sed -i "s|PLACEHOLDER|${GITHUB_SHA}|g" k8s/deployment.yaml

      # 7. Commit updated YAML back to repo
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${GITHUB_SHA}" || echo "No changes to commit"
          git push
